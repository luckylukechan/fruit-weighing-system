<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>基于YOLOv11模型实现的水果识别称重系统</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: #f4f6f8;
            font-family: "Microsoft YaHei", Arial, sans-serif;
        }

        /* 页面整体网格 */
        .page {
            display: grid;
            grid-template-columns: 1fr 2fr;
            grid-template-rows: 1fr 1fr;
            gap: 20px;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        .panel {
            background: #ffffff;
            border-radius: 14px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
            padding: 20px;
            box-sizing: border-box;
        }

        /* 左上角：实时信息 */
        .info-panel {
            grid-column: 1 / 2;
            grid-row: 1 / 2;
        }

        .info-item {
            margin-bottom: 18px;
        }

        .label {
            font-size: 14px;
            color: #666;
            margin-bottom: 6px;
        }


        .value {
            min-height: 36px;          /* 固定占位高度 */
            line-height: 36px;
            display: flex;
            font-size: 26px;
            font-weight: bold;
            align-items: center;
            color: #333;               /* 空态颜色 */
        }


        /* 中间区域（预留组件） */
        .center-panel {
            grid-column: 2 / 3;
            grid-row: 1 / 3;
            color: #333;
            border: 2px dashed #ccc;

            height: 100%;
            overflow-y: auto;
            background-color: #f7f7f7;
            padding: 10px;
            font-size: 20px;
        }

        /* 右下角：总价 */
        .total-panel {
            grid-column: 1 / 2;
            grid-row: 2 / 3;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .total-value {
            font-size: 40px;
            font-weight: bold;
            color: #d32f2f;
        }

        /* 按钮区域（可选） */
        .buttons {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }

        button {
            flex: 1;
            height: 48px;
            font-size: 18px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
        }

        #confirm-payment {
            background: #4caf50;
            color: #fff;
        }

        #cancel-payment {
            background: #f44336;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="page">
        <!-- 左上角：实时信息 -->
        <div class="panel info-panel">
            <div class="info-item">
                <div class="label">当前重量</div>
                <div class="value" id="weight">{{ weight }} 克</div>
            </div>

            <div class="info-item">
                <div class="label">水果种类</div>
                <div class="value" id="fruit">------</div>
            </div>

            <div class="info-item">
                <div class="label">当前价格</div>
                <div class="value" id="price">{{ once_price }} 元</div>
            </div>
        </div>

        <!-- 中间：会话识别列表 -->
        <div class="panel center-panel">
            <div class="panel-title">本次识别记录</div>
            <div class="record-list" id="record-list">
                <div class="empty">暂无识别记录</div>
            </div>
        </div>

        <!-- 左下角：总价与操作 -->
        <div class="panel total-panel">
            <div class="label">总价</div>
            <div class="total-value" id="total">{{ total_price }} 元</div>

            <div class="buttons">
                <button id="confirm-payment">确认支付</button>
                <button id="cancel-payment">取消支付</button>
            </div>
        </div>
    </div>

    <script>
        /* ===== 实时数据刷新 ===== */
        setInterval(() => {
            fetch('/data')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('weight').textContent = `${data.weight} 克`;
                    document.getElementById('fruit').textContent = data.fruit_name || '------';
                    document.getElementById('price').textContent = `${data.once_price} 元`;
                    document.getElementById('total').textContent = `${data.total_price} 元`;
                });
        }, 200);

        /* ===== 会话记录刷新 ===== */
        function updateRecordList() {
            fetch('/session_items')
                .then(r => r.json())
                .then(list => {
                    const container = document.getElementById('record-list');
                    container.innerHTML = '';

                    if (list.length === 0) {
                        container.innerHTML = '<div class="empty">暂无识别记录</div>';
                        return;
                    }

                    list.forEach((item, index) => {
                        const row = document.createElement('div');
                        row.className = 'record-row';

                        const text = document.createElement('span');
                        text.textContent =
                            `${index + 1}. ${item.fruit_name}  ${item.weight}g  ￥${item.once_price}`;

                        const btn = document.createElement('button');
                        btn.className = 'delete-btn';
                        btn.textContent = '删除';
                        btn.onclick = () => deleteItem(item.id);

                        row.appendChild(text);
                        row.appendChild(btn);
                        container.appendChild(row);
                    });
                });
        }

        // 会话中删除按钮逻辑
        function deleteItem(id) {
            fetch('/delete_item', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id: id})
            }).then(() => {
                updateRecordList();   // 删除后立刻刷新列表
            });
        }

        setInterval(updateRecordList, 500);

        /* ===== 支付按钮 ===== */
        document.getElementById('confirm-payment').onclick = () => {
            window.location.href = '/pay_page';
        };

        document.getElementById('cancel-payment').onclick = () => {
            fetch('/pay', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({action: 'cancel'})
            });
        };
    </script>
</body>
</html>
