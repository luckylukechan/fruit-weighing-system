<!DOCTYPE html>
<html lang="zh-CN">
<html>
<head>
    <title>支付页面</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f5f6fa;
            text-align: center;
        }

        .container {
            width: 400px;
            margin: 80px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            margin-bottom: 20px;
        }

        .price {
            font-size: 28px;
            color: #e74c3c;
            margin-bottom: 20px;
        }

        .qr img {
            width: 200px;
            margin: 20px 0;
        }

        .tips {
            color: #888;
            margin-bottom: 20px;
        }

        .buttons button {
            width: 120px;
            padding: 10px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .confirm {
            background-color: #2ecc71;
            color: white;
        }

        .cancel {
            background-color: #e74c3c;
            color: white;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>订单支付</h2>
        <div class="price">￥{{ total_price }}</div>
        <div class="qr">
            <img src="{{url_for('static', filename='fake_qr.jpg')}}">
        </div>
        <div class="tips">请使用微信或支付宝扫码支付</div>
        <div id="countdown" style="font-size:20px; color:#555;">
            剩余支付时间：{{ remaining_time }} 秒
        </div>
        <div class="buttons">
            <button class="confirm" onclick="confirmPay()">已完成支付</button>
            <button class="cancel" onclick="cancelPay()">取消支付</button>
        </div>
    </div>
    <script>
        function confirmPay(){
            fetch('/pay', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({action: 'confirm'})
            }).then(()=>{
                alert("支付成功");
                window.location.href = "/";
            });
        }

        function cancelPay(){
            fetch('/pay', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({action: 'cancel'})
            }).then(()=>{
                alert("已取消");
                window.location.href = "/";
            });
        }

        let timeLeft = {{ remaining_time }};

        const timer = setInterval(() => {
            timeLeft--;
            document.getElementById('countdown').innerText =
                "剩余支付时间：" + timeLeft + " 秒";
            if (timeLeft <= 0) {
                clearInterval(timer);
                // alert("支付超时，已自动取消");
                document.getElementById('countdown').innerText = "支付超时，正在返回...";
                // 调用原有取消逻辑
                fetch('/pay', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({action: 'cancel'})
                }).then(() => {
                    window.location.href = "/";
                });
            }
        }, 1000);
    </script>
</body>
</html>
